name: Pull Request Tests

on:
  pull_request:
    branches:
      - main

jobs:
  swift-unit-tests:
    name: Swift Unit Tests
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Run Swift package tests
        env:
          OPEN_SNEK_HW: "0"
        run: swift test --package-path OpenSnek
